<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Live Test Rig</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #121212;
        color: #fff;
      }

      #log {
        background-color: #000;
        padding: 10px;
        height: 300px;
        overflow-y: scroll;
        border: 1px solid #333;
      }

      .status-on {
        color: #00ff00;
      }

      .status-off {
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Broadcast Control</h1>
    <p id="status">Connecting...</p>

    <form id="message-form">
      <input type="text" id="message-input" placeholder="Send cargo..." required />
      <button type="submit">Deploy Message</button>
    </form>

    <h3>Live Stream Logs:</h3>
    <pre id="log"></pre>
  </body>

  <script>
    const status = document.getElementById("status");
    const form = document.getElementById("message-form");
    const input = document.getElementById("message-input");
    const logEl = document.getElementById("log");

    // 1. Initiate the Handshake
    //    Browser creates TCP connection to server
    //    Send HTTP GET request to upgrade to WebSocket protocol
    //    Wait for 101 response (protocol upgrade)
    const socket = new WebSocket("ws://localhost:8080");

    socket.addEventListener("open", () => {
      status.textContent = "CONNECTED: ws://localhost:8080";
      status.className = "status-on";
      appendLog("SYSTEM", "Tunnel Established");
    });

    socket.addEventListener("close", () => {
      status.textContent = "DISCONNECTED: ws://localhost:8080";
      status.className = "status-off";
      appendLog("SYSTEM", "Tunnel Collapsed");
    });

    socket.addEventListener("message", (event) => {
      appendLog("RECEIVED", event.data);
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (socket.readyState !== WebSocket.OPEN) {
        appendLog("ERROR", "No active tunnel found");
        return;
      }

      const message = input.value.trim();
      if (message) {
        socket.send(message);
        appendLog("SENT", message);
        input.value = "";
        input.focus();
      }
    });

    function appendLog(label, message) {
      const entry = `${new Date().toLocaleTimeString()} [${label}]: `;
      logEl.textContent += `${entry}${message}\n`;
    }
  </script>
</html>
